name: ci

# Builds helix-unwrapped + helix and pushes ONLY their runtime closures to the
# `0x130c` cachix cache (so cargo vendor dirs and the rust toolchain never land in
# the cache). The `update` job tracks helix master daily and commits the new
# flake.lock only when the build actually succeeds.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    # Daily at 04:00 UTC — bump helix master.
    - cron: "0 4 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    # Validate/build current lock on commits, PRs and manual runs (not the cron bump).
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - name: Use 0x130c cache
        run: |
          nix run nixpkgs#cachix -- use 0x130c
        env:
          CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Build
        run: |
          nix build .#helix-unwrapped --out-link result-unwrapped --print-build-logs
          nix build .#helix           --out-link result-helix     --print-build-logs
      - name: Push runtime closures
        if: github.event_name != 'pull_request'
        env:
          CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
        run: |
          nix path-info -r ./result-unwrapped ./result-helix \
            | nix run nixpkgs#cachix -- push 0x130c

  update:
    # Track helix master: bump, build, push, and commit the lock only on success.
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - name: Use 0x130c cache
        run: |
          nix run nixpkgs#cachix -- use 0x130c
        env:
          CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Bump helix-src to latest master
        run: nix flake update helix-src
      - name: Build (gates the commit — a broken master never gets committed)
        run: |
          nix build .#helix-unwrapped --out-link result-unwrapped --print-build-logs
          nix build .#helix           --out-link result-helix     --print-build-logs
      - name: Push runtime closures
        env:
          CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
        run: |
          nix path-info -r ./result-unwrapped ./result-helix \
            | nix run nixpkgs#cachix -- push 0x130c
      - name: Commit flake.lock if it changed
        run: |
          if ! git diff --quiet flake.lock; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -am "flake.lock: bump helix-src master ($(date -u +%F))"
            git push
          else
            echo "helix master unchanged; nothing to commit."
          fi
