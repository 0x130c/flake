name: update

# Track helix master: bump flake.lock, build to validate, and commit the new lock
# only when the build succeeds (a broken master never reaches consumers). Does NOT
# push to the cache — run push-cache manually to refresh the cache for the new rev.

on:
  schedule:
    - cron: "0 4 * * *" # daily 04:00 UTC
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - uses: DeterminateSystems/nix-installer-action@main
      - name: Use 0x130c cache (substituter, for fast pulls)
        run: nix run nixpkgs#cachix -- use 0x130c
        env:
          CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Bump helix-src to latest master
        run: nix flake update helix-src
      - name: Build (gates the commit — a broken master never gets committed)
        run: |
          nix build .#helix-unwrapped --out-link result-unwrapped --print-build-logs
          nix build .#helix           --out-link result-helix     --print-build-logs
      - name: Commit flake.lock if it changed
        run: |
          if ! git diff --quiet flake.lock; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -am "flake.lock: bump helix-src master ($(date -u +%F))"
            git push
          else
            echo "helix master unchanged; nothing to commit."
          fi
